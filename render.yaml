# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec

services:
  # ── RetailOS API ──
  - type: web
    name: retailos-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "import asyncio; from db.session import init_db; asyncio.run(init_db())"
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: retailos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: retailos-redis
          type: redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: RETAILOS_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true

  # ── Redis Cache ──
  - type: redis
    name: retailos-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ── PostgreSQL ──
  - name: retailos-db
    plan: free
    databaseName: retailos
    user: retailos
